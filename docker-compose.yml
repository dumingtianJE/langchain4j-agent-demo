version: '3.8'

services:
  # LangChain4j Agent 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langchain4j-agent
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - LANGCHAIN4J_OPEN_AI_CHAT_MODEL_API_KEY=${DASHSCOPE_API_KEY}
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/ai-agent-db
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge
