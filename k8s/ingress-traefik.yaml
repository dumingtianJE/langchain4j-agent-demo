# Traefik Ingress 配置（适配 k3s 自带的 Traefik）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langchain4j-agent-ingress
  namespace: langchain4j-agent
  labels:
    app: langchain4j-agent
  annotations:
    # Traefik 入口点配置
    traefik.ingress.kubernetes.io/router.entrypoints: web
    
    # 启用 TLS（如果使用 HTTPS）
    # traefik.ingress.kubernetes.io/router.tls: "true"
    
    # 限流配置（Traefik 中间件）
    # traefik.ingress.kubernetes.io/router.middlewares: langchain4j-agent-ratelimit@kubernetescrd
    
    # 基本认证（可选）
    # traefik.ingress.kubernetes.io/router.middlewares: langchain4j-agent-auth@kubernetescrd
    
    # WebSocket 支持（Traefik 自动支持）
    # 无需额外配置
    
    # 代理超时配置
    traefik.ingress.kubernetes.io/router.servers.transport: langchain4j-agent-transport@kubernetescrd
spec:
  ingressClassName: traefik  # 使用 traefik
  
  # TLS 配置（可选，如果有证书）
  # tls:
  #   - hosts:
  #       - langchain4j-agent.your-domain.com
  #     secretName: langchain4j-agent-tls
  
  # 路由规则
  rules:
    # 如果有域名，取消注释并替换为您的域名
    # - host: langchain4j-agent.your-domain.com
    #   http:
    #     paths:
    #       - path: /api
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: langchain4j-agent-service
    #             port:
    #               number: 8080
    #       
    #       - path: /
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: langchain4j-agent-service
    #             port:
    #               number: 8080
    
    # 不使用域名，直接通过 IP 访问
    - http:
        paths:
          # API 路径
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: langchain4j-agent-service
                port:
                  number: 8080
          
          # Actuator 监控路径
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: langchain4j-agent-service
                port:
                  number: 8080
          
          # 默认路径
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langchain4j-agent-service
                port:
                  number: 8080
