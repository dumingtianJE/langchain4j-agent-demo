# 敏感信息 Secret
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: langchain4j-agent
  labels:
    app: langchain4j-agent
type: Opaque
data:
  # 注意：这里的值需要 base64 编码
  # echo -n 'your-value' | base64
  
  # 通义千问 API Key (替换为您的实际值)
  DASHSCOPE_API_KEY: c2stYjEwOTVlZmE0MWNmNGZlZTgyZWY0ZTEzYWU2YTZjOWY=
  
  # Redis 密码 (替换为您的实际值)

  REDIS_PASSWORD: cmVkaXMxMjM=
  
  # JWT Secret (替换为您的实际值)
  JWT_SECRET: bXlTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25BbmRWYWxpZGF0aW9uMTIzNDU2Nzg5
  
  # PostgreSQL 数据库密码 (替换为您的实际值)
  POSTGRES_USER: YWRtaW4=
  POSTGRES_PASSWORD: eW91ci1wYXNzd29yZA==
  
  # RabbitMQ Erlang Cookie (替换为您的实际值)
  RABBITMQ_ERLANG_COOKIE: c2VjcmV0LWNvb2tpZQ==
