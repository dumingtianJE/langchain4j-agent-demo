# RabbitMQ 消息队列部署
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: langchain4j-agent
data:
  rabbitmq.conf: |
    # 基础配置
    default_user = guest
    default_pass = guest
    default_vhost = /
    
    # 内存和磁盘限制
    vm_memory_high_watermark.relative = 0.6
    disk_free_limit.absolute = 2GB
    
    # 集群配置
    cluster_formation.peer_discovery_backend = rabbit_peer_discovery_k8s
    cluster_formation.k8s.host = kubernetes.default.svc.cluster.local
    cluster_formation.k8s.address_type = hostname
    cluster_formation.node_cleanup.only_log_warning = true
    
    # 插件
    enabled_plugins = [rabbitmq_management,rabbitmq_peer_discovery_k8s].
    
    # 日志
    log.console.level = info
    log.file.level = info
    
    # 性能优化
    channel_max = 2047
    connection_max = 1000
    frame_max = 131072
    heartbeat = 60
---
# RabbitMQ StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: langchain4j-agent
  labels:
    app: rabbitmq
spec:
  serviceName: rabbitmq-service
  replicas: 3
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: RABBITMQ_ERLANG_COOKIE
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - check_running
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-config
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi
---
# RabbitMQ Service
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: langchain4j-agent
  labels:
    app: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
      name: amqp
    - port: 15672
      targetPort: 15672
      name: management
  type: ClusterIP
  clusterIP: None  # Headless Service for StatefulSet
---
# RabbitMQ Management Service (NodePort)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  namespace: langchain4j-agent
  labels:
    app: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - port: 15672
      targetPort: 15672
      name: management
  type: NodePort
