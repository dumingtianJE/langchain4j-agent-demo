# 应用配置 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: langchain4j-agent
  labels:
    app: langchain4j-agent
data:
  # Spring Boot 配置
  SPRING_PROFILES_ACTIVE: "production"
  
  # 数据库配置
  SPRING_DATASOURCE_URL: "jdbc:h2:file:/app/data/ai-agent-db;DB_CLOSE_ON_EXIT=FALSE"
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
  
  # Redis 配置
  SPRING_REDIS_HOST: "redis-service"
  SPRING_REDIS_PORT: "6379"
  SPRING_REDIS_TIMEOUT: "5000"
  
  # Milvus 向量数据库配置
  AI_EMBEDDING_TYPE: "milvus"
  AI_MILVUS_HOST: "milvus-service"
  AI_MILVUS_PORT: "19530"
  
  # PostgreSQL 数据库配置（可选，替代 H2）
  POSTGRES_DB: "agent_db"
  # SPRING_DATASOURCE_URL: "jdbc:postgresql://postgresql-service:5432/agent_db"
  # SPRING_DATASOURCE_USERNAME: "admin"
  # SPRING_DATASOURCE_PASSWORD: "your-password"  # 从 Secret 读取
  
  # Redis Sentinel 配置（可选，替代单机 Redis）
  SPRING_REDIS_SENTINEL_MASTER: "mymaster"
  # SPRING_REDIS_SENTINEL_NODES: "redis-sentinel-0.redis-sentinel-service:26379,redis-sentinel-1.redis-sentinel-service:26379,redis-sentinel-2.redis-sentinel-service:26379"
  
  # RabbitMQ 消息队列配置（可选）
  # SPRING_RABBITMQ_HOST: "rabbitmq-service"
  # SPRING_RABBITMQ_PORT: "5672"
  # SPRING_RABBITMQ_USERNAME: "guest"  # 从 Secret 读取
  # SPRING_RABBITMQ_PASSWORD: "guest"  # 从 Secret 读取
  # SPRING_RABBITMQ_LISTENER_SIMPLE_CONCURRENCY: "5"
  # SPRING_RABBITMQ_LISTENER_SIMPLE_MAX_CONCURRENCY: "10"
  
  # Elasticsearch 日志系统配置（可选）
  # SPRING_ELASTICSEARCH_URIS: "http://elasticsearch:9200"
  
  # JWT 配置
  JWT_EXPIRATION: "86400"
  
  # API 限流配置
  AI_RATELIMIT_ENABLED: "true"
  AI_RATELIMIT_REQUESTS_PER_MINUTE: "100"
  AI_RATELIMIT_BURST_CAPACITY: "150"
  
  # 日志配置
  LOGGING_LEVEL_COM_YOURCOMPANY: "INFO"
  LOGGING_LEVEL_DEV_LANGCHAIN4J: "INFO"
  LOGGING_FILE_NAME: "/app/logs/application.log"
  
  # JVM 参数
  JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"
