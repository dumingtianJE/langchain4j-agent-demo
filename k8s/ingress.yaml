# Ingress 配置（外部访问）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langchain4j-agent-ingress
  namespace: langchain4j-agent
  labels:
    app: langchain4j-agent
  annotations:
    # Nginx Ingress 注解
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    
    # 限流配置
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    
    # WebSocket 支持
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    
    # 监控端点保护
    nginx.ingress.kubernetes.io/server-snippet: |
      location /actuator/ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
      }
    
    # 证书管理器（如果使用 cert-manager）
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  
  # TLS 配置
  tls:
    - hosts:
        - langchain4j-agent.your-domain.com
      secretName: langchain4j-agent-tls
  
  # 路由规则
  rules:
    - host: langchain4j-agent.your-domain.com
      http:
        paths:
          # API 路径
          - path: /api/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: langchain4j-agent-service
                port:
                  number: 8080
          
          # Actuator 监控路径（内网访问）
          - path: /actuator/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: langchain4j-agent-service
                port:
                  number: 8080
          
          # 默认路径
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langchain4j-agent-service
                port:
                  number: 8080
