# Spring Boot 配置
spring:
  application:
    name: langchain4j-agent-demo
  
  # 允许循环依赖（临时解决方案）
  main:
    allow-circular-references: true
  
  # 数据库配置 (H2 开发环境)
  datasource:
    url: jdbc:h2:file:/app/data/ai-agent-db;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # HikariCP 连接池优化
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
      connection-test-query: SELECT 1
  
  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  
  # H2 控制台 (开发环境)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Redis 配置（生产环境）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000
  
server:
  port: 8080

# LangChain4j OpenAI 配置 (兼容通义千问)
# 使用阿里云通义千问模型
langchain4j:
  open-ai:
    chat-model:
      api-key: ${DASHSCOPE_API_KEY:sk-b1095efa41cf4fee82ef4e13ae6a6c9f}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model-name: ${DASHSCOPE_MODEL:qwen-max}
      temperature: 0.7
      timeout: PT60S
      log-requests: ${LOG_REQUESTS:false}
      log-responses: ${LOG_RESPONSES:false}

# AI 监管配置
ai:
  supervisor:
    max-tokens-per-request: 10000
    max-tokens-per-hour: 100000
    max-tokens-per-day: 1000000
    max-concurrent-requests: 10
    alert-threshold: 0.8
  
  # 向量存储配置
  embedding:
    type: filesystem
    filesystem-path: /app/data/embeddings
    auto-save-interval: 300
  
  # Milvus 向量数据库配置（生产环境）
  milvus:
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    collection-name: ai_knowledge_embeddings
    dimension: 1024
    index-type: HNSW
    metric-type: COSINE
    hnsw-m: 16
    hnsw-ef-construction: 200
    hnsw-ef: 64
    ivf-nlist: 1024
    ivf-nprobe: 16
  
  # API 限流配置（生产环境）
  ratelimit:
    enabled: true
    requests-per-minute: 100
    burst-capacity: 150

# JWT 配置
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation123456789}
  expiration: ${JWT_EXPIRATION:86400}

# Prometheus 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    enable:
      all: true

# 日志配置
logging:
  level:
    dev.langchain4j: ${LOG_LEVEL_LANGCHAIN4J:INFO}
    com.yourcompany: ${LOG_LEVEL_APP:INFO}
    io.milvus: WARN
  file:
    name: /app/logs/application.log
    max-size: 100MB
    max-history: 30
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
